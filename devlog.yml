# Pidgeon Development Log
# Architectural decisions, trade-offs, and rationale.
# Machine-queryable by design.

decisions:

  - id: 001
    date: 2026-03-29
    title: Bun over pnpm + tsup
    choice: bun workspaces + bun build + bun test
    alternatives:
      - pnpm + tsup (industry standard, maximum reviewer familiarity)
      - pnpm + turborepo (cached parallel tasks — overkill for this scope)
      - nx (heavy scaffolding, wrong signal)
    rationale: >
      Speed and minimal config for both developer and reviewer.
      Bun covers package management, builds, and testing natively.
    production_note: >
      pnpm + tsup is likely the better choice within enterprise —
      broader toolchain compatibility, more battle-tested for library publishing,
      and no assumption about the consumer's runtime.

  - id: 002
    date: 2026-03-29
    title: Hybrid carrier abstraction over pure strategy or plugin pattern
    choice: Interface-based with optional methods + simple factory
    alternatives:
      - Pure strategy pattern (rigid — all carriers must implement all methods)
      - Runtime plugin registry (over-engineered, runtime type safety gaps)
    rationale: >
      Choosing flexibility and less setup over what might be the most useful
      (but also most matured) production pattern. The hybrid lets carriers
      support different subsets of operations without forcing method stubs.
      A real system at scale might evolve toward runtime registration.

  - id: 003
    date: 2026-03-29
    title: Native fetch over HTTP client libraries
    choice: Bun native fetch with hand-rolled retry/timeout wrapper
    alternatives:
      - ky (tiny fetch wrapper — saves ~15 lines)
      - got (full-featured Node HTTP client — enterprise incumbent)
      - axios (legacy, heavy for what it does)
    rationale: >
      No external HTTP dependency. Building a library/SDK — not forcing
      an HTTP dep on consumers is a feature. Hand-rolled wrapper demonstrates
      understanding of HTTP mechanics (retry, backoff, timeout, 429 handling).

  - id: 004
    date: 2026-03-29
    title: Types via core, not separate package
    choice: Domain types exported from @pidgeon/core
    alternatives:
      - Separate @pidgeon/types package (useful when external consumers need types only)
    rationale: >
      No external consumers — this is a privately scoped package. Core re-exports
      types. import type erases at build time so there's no runtime cost.
      A mature system with external consumers might split types out.

  - id: 005
    date: 2026-03-29
    title: Hybrid error handling
    choice: Result<T> at provider boundaries, custom error classes internally
    alternatives:
      - Error classes only (idiomatic but invisible in type signatures)
      - Result type only (explicit but verbose and fights JS conventions)
    rationale: >
      Provider boundary never throws — returns Result<T>. Internal code may throw,
      caught and wrapped at the boundary. Caller gets type-safe error handling.
      Internal code stays idiomatic. Demonstrates understanding of both paradigms.

  - id: 006
    date: 2026-03-29
    title: Reactive rate limiting
    choice: 429 detection with Retry-After parsing + exponential backoff
    alternatives:
      - Proactive client-side rate limiter (token bucket / sliding window)
      - Both proactive + reactive
    rationale: >
      Reactive piggybacks on existing retry logic — minimal additional code.
      Works without knowing carrier limits in advance. Proactive rate limiting
      (token bucket) is a scale consideration — documented as production improvement.

  - id: 007
    date: 2026-03-29
    title: In-memory OAuth token cache
    choice: In-memory with expiry tracking
    alternatives:
      - File-backed persistence
      - Redis-backed (shared across fleet instances)
    rationale: >
      OAuth client-credentials tokens are cheap to re-acquire on restart.
      A cold start costs one HTTP call. Redis-backed caching is a production
      concern for multi-instance deployments — documented, not implemented.

  - id: 008
    date: 2026-03-29
    title: Commander for CLI
    choice: commander (declarative subcommands, auto-generated help)
    alternatives:
      - Raw process.argv parsing (~15 lines for simple case)
      - yargs (heavier, more features than needed)
      - bun util.parseArgs (no subcommand routing)
    rationale: >
      The brief says the team extends this over time. Commander gives
      declarative subcommand registration — the next dev adds a command
      without understanding argv internals. Tiny, stable, zero transitive deps,
      and the next engineer has used it before.

  - id: 009
    date: 2026-03-29
    title: Realistic UPS payloads over simplified stubs
    choice: Test fixtures based on real UPS API documentation payloads
    alternatives:
      - Hand-crafted simplified payloads
    rationale: >
      Simplified stubs would break on transition to actual payloads.
      Using realistic payloads from docs means normalisation logic is
      shaped to handle real-world structure from day one.
      Focus on the 20% of payload surface that covers 80%+ of use cases.

  - id: 010
    date: 2026-03-29
    title: Normalised RateQuote field set
    choice: >
      carrier, serviceCode, serviceName, totalCharge, currency,
      estimatedDelivery, transitDays, surcharges[], billableWeight, guaranteed
    alternatives:
      - Minimal (price + service only)
      - Exhaustive (zone, rate type, negotiated vs published, exchange rates)
    rationale: >
      Callers considered: checkout UI, order management, shipping cost calculator,
      multi-carrier comparison engine, finance/invoice reconciliation.
      This field set covers the 80/20 across all of them. Zone and rate type
      are nice-to-haves worth adding when a specific caller needs them.

  - id: 011
    date: 2026-03-29
    title: Zod config validation at startup
    choice: Single config module with Zod schema, validated on load
    alternatives:
      - Raw process.env reads scattered across modules
      - dotenv + manual validation
    rationale: >
      Proactive measure against config sprawl. Fails fast on missing/invalid
      config. Single source of truth. Type-safe config object flows through
      the application.

  - id: 012
    date: 2026-03-29
    title: Public repo
    choice: Public GitHub repository
    alternatives:
      - Private with collaborator invite (extra click for reviewer)
    rationale: >
      Zero friction for reviewer — click link, see code. Doubles as portfolio work.
      No company name or challenge framing in the repo.

  - id: 013
    date: 2026-03-29
    title: devlog.yml over DEVLOG.md
    choice: YAML-structured decision log
    alternatives:
      - Markdown prose (DEVLOG.md)
    rationale: >
      Structured data, not prose. Machine-queryable — LLMs and scripts
      can grep it. Humans can read it too.

  - id: 014
    date: 2026-03-29
    title: Outside-in build order over boundary-first
    choice: Walking skeleton → deepen layers → extract abstractions
    alternatives:
      - Bottom-up boundary-first (types → schemas → errors → config → http → interface → implementation → tests)
    rationale: >
      Boundary-first is a classic LLM-favoured ordering — clean on paper,
      assembles pieces in isolation, then hopes they compose at integration.
      Unpleasant surprises live at the seams, and you don't hit seams until
      step 10 when you've already committed to shapes that might not fit.
      Outside-in starts with the use case, forces the vertical slice into
      existence immediately, and deepens from a working through-line.
      Types, errors, and config are extracted from working code —
      not prescribed before you know what you need.
    correction: >
      Initial build order was revised after recognising the bottom-up
      approach optimised for responsibility boundaries at the expense of
      encountering unanticipated complexity early. The outside-in approach
      hits integration boundaries first with a walking skeleton, then
      refactors inward with confidence that the shape holds.

  - id: 015
    date: 2026-03-29
    title: Error boundary before request building (reorder steps 6 → 4 → 5 → 7)
    choice: Implement error paths (BUILD_ORDER step 6) before request building (step 4)
    alternatives:
      - Follow original BUILD_ORDER sequence (4 → 5 → 6 → 7)
    rationale: >
      Three cross-family adversarial reviews (Claude, Codex, Gemini) independently
      identified the missing error boundary as the highest-severity finding.
      The Result<T> return type is decorative — getRates() throws on every
      non-happy path. Building request logic and response normalization inside
      a broken boundary means every new feature inherits the same flaw.
      Establishing the try/catch boundary first means steps 4, 5, and 7
      build inside a safe container rather than bolting error handling on after.
    evidence: >
      docs/reviews/walking-skeleton-20260329-141436-claude.md (CRITICAL),
      docs/reviews/walking-skeleton-20260329-141449-codex.md (HIGH),
      docs/reviews/walking-skeleton-20260329-153000-gemini.md (HIGH+MEDIUM)

  - id: 016
    date: 2026-03-29
    title: FetchFn type replaces typeof globalThis.fetch
    choice: Narrow FetchFn callable type for fetch injection
    alternatives:
      - typeof globalThis.fetch (includes static methods like preconnect)
    rationale: >
      TS 6 + bun-types define globalThis.fetch with a preconnect static method.
      Our code only calls fetch() — never accesses statics. The narrow FetchFn
      type accepts globalThis.fetch (structurally compatible) but also accepts
      simple arrow functions in tests without double-casting through unknown.
      Resolves Claude review finding #2 (HIGH) about the double-cast workaround.
    note: >
      Test files (rate.test.ts, rate-errors.test.ts) still use typeof globalThis.fetch
      in their makeProvider helpers. Tester needs to update to FetchFn import.
      Build (tsconfig.build.json) excludes tests so this doesn't block dist output.
      typecheck will report errors in test files until the tester updates them.

  - id: 017
    date: 2026-03-29
    title: Loosen request-builder tests to avoid upstream brittleness
    choice: >
      Test domain-value placement and structural presence of required sections.
      Remove exact assertions on UPS endpoint paths, API version strings,
      RequestOption literals, and upstream enum codes.
    alternatives:
      - Keep granular assertions (catches upstream drift but breaks on every API version bump)
      - Full payload snapshot tests (maximum coverage, maximum brittleness)
    rationale: >
      Round 3 triage produced tests that effectively snapshot the outbound UPS
      request body. These tests broke on any upstream format change even when
      this library's behavior was correct. The practical rule: if the assertion
      catches a bug in this library, keep it; if it only catches an upstream
      API change, loosen or remove it. Wire-format fidelity belongs in
      integration/contract tests, not unit tests.
    evidence: >
      Operator review of request-builder.test.ts after triage T1-T5 implementation.
      Test count went from 11 to 9 (removed 2 upstream-coupled tests, consolidated
      structural checks). All 26 tests green.

  - id: 018
    date: 2026-03-29
    title: Independent adversarial reviews — no cross-reading
    choice: Each adversarial review is conducted independently from the code, not from prior reports
    alternatives:
      - Read all prior reviews and track resolution status across them
      - Read only same-model prior reviews
    rationale: >
      Reading prior reviews introduces anchoring bias — the reviewer fixates on
      what was already found instead of discovering issues from first principles.
      Cross-family reviews (Evidence Hierarchy rank 4) lose their value if one
      reviewer's findings are shaped by another's. A finding that two independent
      reviewers discover separately is stronger evidence than one finding
      propagated through review reports. Resolution status of prior findings
      should be inferred from the code itself (e.g., does the try/catch exist?),
      not from reading a report that says it was added.

  - id: 019
    date: 2026-03-29
    title: Step 5 (response normalisation) next, then step 8 (retry/backoff)
    choice: >
      Resume BUILD_ORDER with step 5 on feature/response-normalisation branch.
      Multi-service mapping, GuaranteedIndicator, edge cases in quote mapping.
      Step 8 (retry, backoff, timeout wrapper) follows after step 5.
    alternatives:
      - Jump to step 8 (HTTP wrapper) to close Retry-After carried finding
      - Jump to step 9 (Zod validation) to close schema-related deferrals
    rationale: >
      Step 5 completes the rating flow end-to-end before adding infrastructure
      (retry, validation). It also closes the GuaranteedIndicator finding
      carried as open across 4 adversarial review rounds. The mapper
      infrastructure exists from steps 2+6; step 5 deepens coverage.
      Step 8 is the next cross-cutting concern (like auth was) and should
      follow once the rating response surface is fully mapped.
