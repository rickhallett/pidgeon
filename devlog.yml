  - id: D012
    date: 2026-03-29
    title: Inject mock delay to eliminate wall-clock cost of retry/timeout tests
    status: deferred
    defer_to: janitor pass
    source:
      - claude
      - triage round 6
    rationale: >
      The timeout retry test runs 4 attempts × 3s real timeouts plus exponential
      backoff delays, adding ~14s of wall-clock time to the suite (total went from
      15s to 27s). Injecting a mock delay function would make retry and backoff
      tests instant and deterministic, eliminating both the time cost and the
      timing-sensitive fragility flagged in the Claude MEDIUM finding. This is a
      test infrastructure improvement — no production code change needed.
    follow_up_trigger: >
      Address during janitor pass after HTTP retry behavior is stable and committed.

  - id: D013
    date: 2026-03-29
    title: Config test gaps acknowledged — invalid URL format and negative token buffer
    status: acknowledged-not-added
    source:
      - tester review of config.test.ts and config-wiring.test.ts
    rationale: >
      Two minor test gaps identified during tester review of step 9 config tests:
      (1) No test for invalid URL format (e.g. UPS_RATING_URL="not-a-url") —
      Zod's .url() validator rejects it, but the rejection path is untested.
      (2) No test for negative UPS_TOKEN_EXPIRY_BUFFER_SECONDS — Zod's
      .nonnegative() rejects it, but no explicit test exists.
      Both are Zod-level validation; the tests would verify the library's
      built-in validators, not our logic. The config surface is thin
      (schema + env mapping) and the existing 20 tests cover the behavioral
      contract: valid loads, missing required fields, bad values, defaults,
      and wiring through to the provider. Adding more would test Zod, not us.
    follow_up_trigger: >
      Revisit if config validation bugs surface or if Zod schema changes
      introduce regressions in rejection paths.

  - id: D014
    date: 2026-03-29
    resolved: 2026-03-29
    title: Extract the shared HTTP layer into @pidgeon/core
    status: resolved
    source:
      - spec/prd fresh review
      - carried review oversight
    resolution: >
      Implemented in step 12. Created packages/core/src/http.ts with
      httpRequest() function encapsulating retry, backoff, timeout, 429
      Retry-After, structured error mapping, and Logger integration.
      ErrorBodyParser callback allows carrier-specific error extraction.
      UPS rate provider refactored to delegate HTTP to core, keeping only
      carrier-specific auth, request building, and response parsing.
      rate.ts went from 468 lines to ~280 lines (132 lines removed).
