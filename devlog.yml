  - id: D007
    date: 2026-03-29
    resolved: 2026-03-29
    title: Structured carrier error types at the provider boundary
    status: resolved
    source:
      - gemini
      - carried
    resolution: >
      Implemented as CarrierError type with code (discriminated union),
      message, carrier, and retriable fields. Result<T, E> is now generic
      over error type (default E=string for backward compatibility).
      CarrierResult<T> = Result<T, CarrierError> used by CarrierProvider.
      All UPS error returns classified by code with retriable flag.
      Registry and config retain string errors via the default type parameter.
      See decision 019 for why this uses a discriminated union rather than
      the spec's class hierarchy.

