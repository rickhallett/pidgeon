    rationale: >
      Retrying malformed success bodies is uncommon and not clearly correct
      without stronger upstream evidence. The current behavior returns a parse
      failure immediately.
    follow_up_trigger: >
      Revisit if UPS intermittently serves corrupt 200 bodies or if transport
      policy is expanded to distinguish retriable parse failures.

